<head>
    <title>Map Testing</title>

    <link rel="stylesheet" href="style.css">
    <script src="connection.js"></script>
    <script src="main.js" defer></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    
</head>
<body>
    <div style="display:flex;">
        <div id = "map" style="height: 900px; width: 85%;"></div>   

        <form id="earthquakeSearch" style="margin-left: 10px; width:15%; background:rgb(147, 147, 227); padding:10px; text-align: center;" action="/index.html/submission-end">
            <label>Start Date:<input id="startDate" name="startDate" type="date"></label>
            <hr>
            <label style="">End Date:<input id="endDate" name="endDate" type="date"></label>
            <hr>
            <input id="minMag" name="minMag" placeholder="Minimum Magnitude" value = 0 type = "number" step="any" min=0 max=10>
            
            <hr>
            <input id="maxMag" name="maxMag" placeholder="Maximum Magnitude" value = 10 type = "number" step="any"  min=0 max = 10>
            <hr>
            <label for="natural">Only View Natural Earthquakes<input id="natural" name="natural" type="checkbox"></label>
            <hr>
            <button type="submit" style="width:90%">Submit</button>
        </form>
    </div>
</body>
