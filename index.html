<head>
    <title>Map Testing</title>

    <script src="main.js" defer></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
</head>
<body>
    <div style="display:flex;">
        <div id = "map" style="height: 900px; width: 1200px;"></div>   

        <form style="margin-left: 20px;">
            <label for="startDate">Start Time</label>
            <br>
            <input id="startDate" type="date">
            <input id="endDate" type="date">
            <br>
            <br>
            <input id="minMag" placeholder="Minimum Magnitude">
            <input id="maxMag" placeholder="Maximum Magnitude">
            <br>
            <br>
            <label for="natural">Only View Natural Earthquakes</label>
            <input id="natural" type="checkbox">
            <br>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
